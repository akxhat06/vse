<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <title>VSE — Vishwa Shree Enterprises</title>
  <desc>Circular logo for Vishwa Shree Enterprises in forest green and cream</desc>

  <defs>
    <path id="arc-top" d="M 150,150 m -90,0 a 90,90 0 0,1 180,0"/>
    <path id="arc-bot" d="M 150,150 m -76,0 a 76,76 0 0,0 152,0"/>
  </defs>

  <!-- outer dark bg circle -->
  <circle cx="150" cy="150" r="145" fill="#0a3d2e"/>

  <!-- dashed cream outer ring -->
  <circle cx="150" cy="150" r="136" fill="none" stroke="#e8d5a3" stroke-width="2.2" stroke-dasharray="9 5"/>

  <!-- inner thin ring -->
  <circle cx="150" cy="150" r="128" fill="none" stroke="#e8d5a3" stroke-width="0.7" opacity="0.5"/>

  <!-- diagonal slash accent -->
  <line x1="95" y1="88" x2="205" y2="198" stroke="#1a6b4a" stroke-width="30" stroke-linecap="round"/>

  <!-- VSE monogram -->
  <text x="150" y="142" text-anchor="middle" dominant-baseline="central"
    font-family="Arial Black, Arial, sans-serif" font-weight="900"
    font-size="68" fill="#e8d5a3" letter-spacing="-3">VSE</text>

  <!-- cream underline -->
  <rect x="96" y="164" width="108" height="3" rx="1.5" fill="#e8d5a3"/>

  <!-- arc text top: VISHWA SHREE -->
  <text font-family="Arial, sans-serif" font-weight="700" font-size="13"
    fill="#e8d5a3" letter-spacing="6">
    <textPath href="#arc-top" startOffset="50%" text-anchor="middle">VISHWA SHREE</textPath>
  </text>

  <!-- arc text bottom: ENTERPRISES -->
  <text font-family="Arial, sans-serif" font-weight="600" font-size="12"
    fill="#a8c5a0" letter-spacing="5" opacity="0.95">
    <textPath href="#arc-bot" startOffset="50%" text-anchor="middle">ENTERPRISES</textPath>
  </text>

  <!-- left leaf accent -->
  <ellipse cx="18" cy="150" rx="6" ry="11" fill="#1a6b4a" transform="rotate(-30,18,150)"/>
  <ellipse cx="18" cy="150" rx="3" ry="9"  fill="#2a8a5a" transform="rotate(-30,18,150)"/>

  <!-- right leaf accent -->
  <ellipse cx="282" cy="150" rx="6" ry="11" fill="#1a6b4a" transform="rotate(30,282,150)"/>
  <ellipse cx="282" cy="150" rx="3" ry="9"  fill="#2a8a5a" transform="rotate(30,282,150)"/>

  <!-- dot separators on sides -->
  <circle cx="22"  cy="150" r="3.5" fill="#e8d5a3" opacity="0.7"/>
  <circle cx="278" cy="150" r="3.5" fill="#e8d5a3" opacity="0.7"/>

</svg>