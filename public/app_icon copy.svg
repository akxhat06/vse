<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">VSE — Vishwa Shree Enterprise</title>
  <desc id="desc">App mark with initials VSE and company name vishwa shree enterprise.</desc>
  <defs>
    <linearGradient id="tile" x1="72" y1="48" x2="464" y2="488" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="55%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#5b21b6"/>
    </linearGradient>
    <linearGradient id="sheen" x1="256" y1="64" x2="256" y2="280" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="45%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" rx="112" ry="112" fill="url(#tile)"/>
  <rect width="512" height="512" rx="112" ry="112" fill="url(#sheen)"/>
  <rect
    x="1.5"
    y="1.5"
    width="509"
    height="509"
    rx="110.5"
    ry="110.5"
    fill="none"
    stroke="#ffffff"
    stroke-opacity="0.14"
    stroke-width="3"
  />

  <text
    x="256"
    y="258"
    text-anchor="middle"
    fill="#ffffff"
    font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
    font-size="148"
    font-weight="700"
    letter-spacing="0.06em"
  >VSE</text>

  <text
    x="256"
    y="322"
    text-anchor="middle"
    fill="#ffffff"
    fill-opacity="0.88"
    font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
    font-size="26"
    font-weight="600"
    letter-spacing="0.14em"
  >vishwa shree enterprise</text>

  <line
    x1="108"
    y1="348"
    x2="404"
    y2="348"
    stroke="#ffffff"
    stroke-opacity="0.22"
    stroke-width="2"
    stroke-linecap="round"
  />
</svg>
